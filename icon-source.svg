<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">AutoCorrect Desktop logo</title>
  <desc id="desc">A simplified app icon with a large CJK text mark and a small correction check.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="48" x2="430" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12343b"/>
      <stop offset="0.58" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0b1726"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientTransform="matrix(170 0 0 150 164 128)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ccfbf1" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ccfbf1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="140" y1="126" x2="366" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#e6fffb"/>
    </linearGradient>
    <linearGradient id="check" x1="318" y1="342" x2="424" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
    <clipPath id="clip">
      <rect x="28" y="28" width="456" height="456" rx="112"/>
    </clipPath>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <circle cx="164" cy="128" r="170" fill="url(#light)"/>
  </g>

  <g filter="url(#shadow)" fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 106v62" stroke-width="42"/>
    <path d="M136 198h240" stroke-width="44"/>
    <path d="M188 250c31 67 83 119 156 157" stroke-width="48"/>
    <path d="M329 246c-28 76-82 132-161 168" stroke-width="48"/>
  </g>

  <path d="M332 358l34 34 74-86" fill="none" stroke="#07241f" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0.28"/>
  <path d="M332 358l34 34 74-86" fill="none" stroke="url(#check)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M332 358l34 34 74-86" fill="none" stroke="#fff7ed" stroke-opacity="0.74" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
